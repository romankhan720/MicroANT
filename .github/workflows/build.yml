name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: x86 (i386 Multiboot)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-multilib nasm binutils

      - name: Build
        run: make

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: microant
          path: microant.bin
